<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05030f"/>
      <stop offset="50%" stop-color="#0d0821"/>
      <stop offset="100%" stop-color="#150a30"/>
    </linearGradient>

    <linearGradient id="streak1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="streak2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#67e8f9" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="streak3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fbcfe8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="frame">
      <rect x="0" y="0" width="900" height="220" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="900" height="220" fill="url(#bgGrad)"/>

    <!-- Falling light streaks -->
    <g filter="url(#glow)">
      <!-- streak group 1 -->
      <rect x="40" y="-120" width="2" height="90" fill="url(#streak1)">
        <animate attributeName="y" from="-120" to="220" dur="2.6s" repeatCount="indefinite"/>
      </rect>
      <rect x="120" y="-160" width="2" height="70" fill="url(#streak2)">
        <animate attributeName="y" from="-160" to="220" dur="3.4s" repeatCount="indefinite" begin="0.4s"/>
      </rect>
      <rect x="210" y="-100" width="2" height="100" fill="url(#streak3)">
        <animate attributeName="y" from="-100" to="220" dur="2.1s" repeatCount="indefinite" begin="0.9s"/>
      </rect>
      <rect x="300" y="-150" width="2" height="80" fill="url(#streak1)">
        <animate attributeName="y" from="-150" to="220" dur="2.9s" repeatCount="indefinite" begin="0.2s"/>
      </rect>
      <rect x="400" y="-90" width="2" height="60" fill="url(#streak2)">
        <animate attributeName="y" from="-90" to="220" dur="2.3s" repeatCount="indefinite" begin="1.1s"/>
      </rect>
      <rect x="490" y="-170" width="2" height="95" fill="url(#streak3)">
        <animate attributeName="y" from="-170" to="220" dur="3.1s" repeatCount="indefinite" begin="0.6s"/>
      </rect>
      <rect x="580" y="-110" width="2" height="70" fill="url(#streak1)">
        <animate attributeName="y" from="-110" to="220" dur="2.5s" repeatCount="indefinite" begin="1.4s"/>
      </rect>
      <rect x="670" y="-140" width="2" height="85" fill="url(#streak2)">
        <animate attributeName="y" from="-140" to="220" dur="3.6s" repeatCount="indefinite" begin="0.1s"/>
      </rect>
      <rect x="750" y="-100" width="2" height="65" fill="url(#streak3)">
        <animate attributeName="y" from="-100" to="220" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
      </rect>
      <rect x="830" y="-160" width="2" height="90" fill="url(#streak1)">
        <animate attributeName="y" from="-160" to="220" dur="3.0s" repeatCount="indefinite" begin="0.3s"/>
      </rect>
      <rect x="70" y="-130" width="1.5" height="55" fill="url(#streak2)" opacity="0.7">
        <animate attributeName="y" from="-130" to="220" dur="2.8s" repeatCount="indefinite" begin="1.7s"/>
      </rect>
      <rect x="260" y="-140" width="1.5" height="60" fill="url(#streak3)" opacity="0.7">
        <animate attributeName="y" from="-140" to="220" dur="2.4s" repeatCount="indefinite" begin="0.5s"/>
      </rect>
      <rect x="450" y="-120" width="1.5" height="50" fill="url(#streak1)" opacity="0.6">
        <animate attributeName="y" from="-120" to="220" dur="3.3s" repeatCount="indefinite" begin="1.2s"/>
      </rect>
      <rect x="620" y="-150" width="1.5" height="65" fill="url(#streak2)" opacity="0.7">
        <animate attributeName="y" from="-150" to="220" dur="2.7s" repeatCount="indefinite" begin="0.9s"/>
      </rect>
      <rect x="800" y="-120" width="1.5" height="55" fill="url(#streak3)" opacity="0.6">
        <animate attributeName="y" from="-120" to="220" dur="3.2s" repeatCount="indefinite" begin="0.2s"/>
      </rect>
    </g>

    <!-- Soft floating glow orbs -->
    <circle cx="150" cy="60" r="60" fill="#8b5cf6" opacity="0.12">
      <animate attributeName="cy" values="60;80;60" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="160" r="70" fill="#22d3ee" opacity="0.1">
      <animate attributeName="cy" values="160;140;160" dur="7s" repeatCount="indefinite"/>
    </circle>

    <!-- Name text -->
    <text x="50%" y="46%" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif"
          font-size="46" font-weight="700" fill="#ffffff" filter="url(#glow)">
      AADITYA SINGLA
    </text>

    <!-- Subtitle -->
    <text x="50%" y="62%" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif"
          font-size="18" fill="#c4b5fd" opacity="0.9">
      2nd Year B.Tech CSE Student • Problem Solver • UI/UX Explorer
    </text>
  </g>
</svg>
